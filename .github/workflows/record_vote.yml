name: Record Feedback Vote

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic key (e.g. football, nfl, politics)"
        required: true
      vote:
        description: "Vote direction: up or down"
        required: true

jobs:
  record:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update preferences.json
        run: |
          python - <<'EOF'
          import json, os, sys

          topic = os.environ["TOPIC"]
          vote = os.environ["VOTE"]

          if vote not in ("up", "down"):
              print(f"Invalid vote: {vote}", file=sys.stderr)
              sys.exit(1)

          with open("preferences.json") as f:
              prefs = json.load(f)

          if topic not in prefs["votes"]:
              prefs["votes"][topic] = {"up": 0, "down": 0}

          prefs["votes"][topic][vote] += 1

          with open("preferences.json", "w") as f:
              json.dump(prefs, f, indent=2)

          print(f"Recorded {vote} for {topic}. New counts: {prefs['votes'][topic]}")
          EOF
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          VOTE: ${{ github.event.inputs.vote }}

      - name: Commit updated preferences
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preferences.json
          git diff --cached --quiet || git commit -m "chore: record ${{ github.event.inputs.vote }} vote for ${{ github.event.inputs.topic }}"
          git push
